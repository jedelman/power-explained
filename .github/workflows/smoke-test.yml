name: Post-Deploy Smoke Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for Cloudflare Pages deploy
        id: wait
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ secrets.CF_PROJECT_NAME }}
        run: |
          echo "Waiting for Cloudflare Pages deploy for commit $GITHUB_SHA..."

          TIMEOUT=600
          INTERVAL=15
          ELAPSED=0
          DEPLOY_URL=""

          while [ $ELAPSED -lt $TIMEOUT ]; do
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$CF_PROJECT_NAME/deployments?per_page=5")

            STATUS=$(echo "$RESPONSE" | node -e "
              const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              const deployments = d.result || [];
              const sha = process.env.GITHUB_SHA;
              const match = deployments.find(dep =>
                dep.deployment_trigger?.metadata?.commit_hash === sha
              ) || deployments[0];
              const state = match?.latest_stage?.status || match?.stages?.slice(-1)[0]?.status || 'unknown';
              const url = match?.url || '';
              console.log(state + '|' + url);
            ")

            STATE=$(echo "$STATUS" | cut -d'|' -f1)
            URL=$(echo "$STATUS" | cut -d'|' -f2)

            echo "Deploy state: $STATE (${ELAPSED}s elapsed)"

            if [ "$STATE" = "success" ]; then
              echo "Deploy ready: $URL"
              echo "deploy_url=$URL" >> $GITHUB_OUTPUT
              break
            elif [ "$STATE" = "failure" ] || [ "$STATE" = "canceled" ]; then
              echo "Deploy failed with state: $STATE"
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ -z "$(echo $GITHUB_OUTPUT | grep deploy_url)" ] && [ "$STATE" != "success" ]; then
            echo "Timed out waiting for deploy after ${TIMEOUT}s"
            exit 1
          fi

      - name: Crawl for broken links
        env:
          DEPLOY_URL: ${{ steps.wait.outputs.deploy_url }}
        run: node scripts/smoke-crawl.mjs "$DEPLOY_URL"
