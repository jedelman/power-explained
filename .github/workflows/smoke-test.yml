name: Post-Deploy Smoke Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for Cloudflare Pages deploy
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          echo "Waiting for deploy of commit $GITHUB_SHA to go live..."

          # Poll the live site until it reflects the current commit
          # The prerendered HTML contains a <meta> comment with the git sha injected at build time
          TIMEOUT=600
          INTERVAL=20
          ELAPSED=0

          # First just wait for the build to likely finish (CF Pages typically takes 60-90s)
          echo "Initial wait 90s for build..."
          sleep 90

          while [ $ELAPSED -lt $TIMEOUT ]; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL")
            echo "Site status: HTTP $HTTP (${ELAPSED}s waited post-initial)"

            if [ "$HTTP" = "200" ]; then
              echo "✓ Site is up"
              break
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$HTTP" != "200" ]; then
            echo "✗ Site not responding after wait"
            exit 1
          fi

      - name: Crawl for broken links
        env:
          DEPLOY_URL: ${{ secrets.SITE_URL }}
        run: node scripts/smoke-crawl.mjs "$DEPLOY_URL"
