name: Preview Deploy

on:
  push:
    branches-ignore: [main]
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Sanitize branch name for worker
        id: sanitize
        run: |
          SANITIZED=$(echo "${{ github.ref_name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/^-*//;s/-*$//' \
            | tr -s '-')
          WORKER_NAME="${SANITIZED}-power-explained"
          WORKER_NAME=$(echo "$WORKER_NAME" | cut -c1-63 | sed 's/-*$//')
          echo "worker_name=$WORKER_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy preview to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy --name "${{ steps.sanitize.outputs.worker_name }}"

      - name: Summarize preview URL
        if: always()
        run: |
          WORKER_NAME="${{ steps.sanitize.outputs.worker_name }}"
          PREVIEW_URL="https://${WORKER_NAME}.edelmanja.workers.dev"
          {
            echo "### Preview Deploy"
            echo ""
            echo "**Branch:** \`${{ github.ref_name }}\`"
            echo "**Worker:** \`${WORKER_NAME}\`"
            echo ""
            echo "**Preview URL:** $PREVIEW_URL"
          } >> "$GITHUB_STEP_SUMMARY"
