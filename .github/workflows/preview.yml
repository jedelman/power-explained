name: Preview Deploy

on:
  push:
    branches-ignore: [main]
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload preview version to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: versions upload --message "Preview: ${{ github.ref_name }} @ ${{ github.sha }}"

      - name: Summarize preview URL
        if: always()
        run: |
          PREVIEW_URL=$(echo "${{ steps.deploy.outputs.command-output }}" | grep -oE 'https://[a-z0-9-]+\.[a-z0-9-]+\.workers\.dev' | head -1 || true)
          {
            echo "### Preview Deploy"
            echo ""
            echo "**Branch:** \`${{ github.ref_name }}\`"
            echo "**Commit:** \`${{ github.sha }}\`"
            echo ""
            if [ -n "$PREVIEW_URL" ]; then
              echo "**Preview URL:** $PREVIEW_URL"
            else
              echo "_Preview URL not parsed — check the upload step's output above._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
