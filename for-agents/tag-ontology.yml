      - freud                # Sigmund Freud — Reich's analyst, the death-drive
      - jung                 # Carl Jung — Reich's contemporary, individuation
      - buddha               # the Buddha — citta-vritti, the floor practice
      - graeber              # David Graeber — Debt, bullshit jobs, the dawn of everything
      - roy-arundhati        # Arundhati Roy — the Narmada dams, the adivasi displaced
      - sorenson             # Richard Sorenson — preconquest consciousness
      - robinson-cedric      # Cedric Robinson — Black Marxism, racial capitalism
