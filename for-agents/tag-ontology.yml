# Tag Ontology — power-explained
#
# The authoritative namespace for tags on gestures (and, in time, on
# plateaus, manifests, and other addressable objects).
#
# Validation contract (enforced by scripts/lint-tags.mjs):
#   - Every tag has the form `<namespace>/<term>`.
#   - Unknown NAMESPACES fail the build. Namespaces are deliberate;
#     a new dimension of attention is an architectural decision and
#     should be declared here first.
#   - Unknown TERMS within a known namespace WARN but pass. Terms are
#     organic — places, people, concepts, years accumulate as the book
#     grows. The lint output is the to-add list; we promote terms to
#     this file in batches, not one at a time.
#
# Evolution policy:
#   - Add new namespaces with deliberation. Each is a query axis the
#     book will be sliced along forever.
#   - Add terms freely in code, harvest into the ontology when convenient.
#   - Never remove a term once promoted — gestures may reference it.
#     Mark deprecated with `deprecated: true` and migration notes.
#   - Renaming a term requires a coordinated edit across all gesture
#     files (same discipline as renaming a gesture ID).

version: 1
last_revised: 2026-05-24

namespaces:

  # ===========================================================================
  # plateau — the home plateau of this gesture, mirrored from the `plateau:`
  # field so tag-only queries can still ask "what's in P-04". Lint enforces
  # that the tag matches the field.
  # ===========================================================================
  plateau:
    description: |
      The gesture's home plateau. One per gesture. Must match the
      structured `plateau:` field on the same file.
    cardinality: exactly-one
    terms:
      - P-01
      - P-02
      - P-03
      - P-04
      - P-05
      - P-06
      - P-07
      - P-08
      - P-09
      - P-10
      - P-11
      - P-12
      - P-13
      - P-14
      - P-15
      - P-16
      - P-16b
      - P-17
      - P-18
      - P-OA       # Orgone Accumulator (initiation chapter)
      - P-RE       # Re-Enchanting the World (initiation chapter)
      - P-EP       # Epilogue
      - P-PR       # Prologue
      - P-GC       # The Goetia of Capital (initiation chapter)
      - P-CE       # Chiron / The Centaur Chapter
      - P-IB       # Interlude: Barcelona
      - P-IW       # Interlude: Counter-Hegemony Without the Word (Washington)
      - P-AB       # The Angel Faces Backward (initiation chapter)
      - P-WW       # The Wizard's Walk (initiation chapter — final, pre-Epilogue)

  # ===========================================================================
  # voice — who is speaking in the gesture. A gesture can carry multiple
  # voices if it really does shift mid-flow. A quoted human counts as a
  # voice when the quote is the gesture (Rukia at the memorial).
  # ===========================================================================
  voice:
    description: |
      Who is speaking in the gesture. Quoted humans count when the quote
      IS the gesture. Multiple voices allowed when the gesture genuinely
      braids them.
    cardinality: one-or-more
    terms:
      # The register-keepers
      - jason             # the narrator's primary voice
      - coyote            # truth-in-plain-sight, dismissal-as-seal
      - nasruddin         # oblique fool sharper than the room
      - kropotkin         # fool with field notes; evidence-grounded
      - castaneda         # the apprentice form; seeing as practice
      # Quoted humans (additive; only when their quote is the gesture)
      - arizmendiarrieta
      - rukia-lumumba
      - chokwe-antar-lumumba
      - subcomandante-moises

  # ===========================================================================
  # kind — what kind of rhetorical move the gesture makes. Multiple kinds
  # allowed; a gesture can be genuinely both (e.g. scene + turn).
  # ===========================================================================
  kind:
    description: |
      The rhetorical form of the gesture. Multiple kinds permitted when
      a move is honestly both (a scene that is also a turn; an argument
      that is also a landing). Untagged means "not yet classified" —
      first-pass mechanical splits leave this empty rather than lie.
    cardinality: zero-or-more
    terms:
      - scene             # continuous narrated event
      - argument          # structural claim
      - landing           # single-sentence gesture that lands
      - litany            # rhetorical cascade
      - turn              # confessional or perspectival shift
      - naming            # names what something is
      - recovery          # recovers something dormant
      - aside             # interjection, often voice-shifted
      - prose             # catch-all for unmarked moves (use sparingly)
      - practice          # how-to-do gesture: instructions for a reader practice
      - praise            # blessing / acknowledgment register (P-WW opening)
      - coda              # closing gesture that resolves and exits
      - synthesis         # weaves prior threads into one shape (P-01 closing summaries)
      - orientation       # tells the reader where they are / where the book is going
      - polemic           # commits a contestable claim; takes a side
      - naturalist        # field-observer register: notices, names, lets be

  # ===========================================================================
  # capacity — which of the six reader capacities the gesture builds.
  # ===========================================================================
  capacity:
    description: |
      Reader capacities the gesture cultivates. From the book's
      architecture: NAME, READ, BUILD, HOLD, ENTER, CONTINUE. Untagged
      means "not yet classified" — first-pass mechanical splits leave
      this empty rather than guess.
    cardinality: zero-or-more
    terms:
      - name
      - read
      - build
      - hold
      - enter
      - continue

  # ===========================================================================
  # status — workflow state. Mirrors beauty_check.passed but enables
  # tag-only queries (e.g. "everything not yet passed").
  # ===========================================================================
  status:
    description: |
      Workflow state of the gesture. Mirrors `beauty_check.passed`
      where applicable.
    cardinality: exactly-one
    terms:
      - draft
      - beauty-pending
      - passed

  # ===========================================================================
  # place — where the gesture's events occur or what territory it covers.
  # Open; new places get added as the book grows.
  # ===========================================================================
  place:
    description: |
      The geographic place the gesture is set in or about. Use the most
      specific name that fits. Multiple allowed when a gesture spans
      places.
    cardinality: zero-or-more
    open: true
    terms:
      - mondragon
      - arrasate           # Basque name for Mondragon — kept as alias-aware
      - basque-country
      - spain
      - burlington-vt
      - champlain          # Champlain Housing Trust service area
      - jackson-ms
      - mississippi
      - kerala
      - india
      - crown-heights      # Brooklyn neighborhood
      - brooklyn
      - new-york
      - chiapas
      - mexico
      - oventic
      - norfolk-va
      - virginia
      - valencia
      - ilocos             # Philippines (zanjera)
      - philippines
      - switzerland        # alpine commons
      - asturias           # andecha
      - munich             # Klee 1920, Benjamin purchase 1921
      - paris              # the arcades, the Passagen-Werk
      - portbou            # Benjamin's death on the Spanish border
      - pyrenees           # Benjamin's crossing
      - washington-state   # the Scar (P-AB)
      - hampton-roads      # Hampton Boulevard, Norfolk-Portsmouth-Newport News region
      - zuccotti-park      # Occupy 2011
      - standing-rock      # 2016 prayer camp
      - germany            # Reich's exile origin (P-OA)
      - norway             # Reich's middle exile (P-OA)
      - seattle            # the floor practice setting (P-OA)
      - the-south          # the-shrug's regional locus (P-OA)
      - atlantic-city      # the casino-enclosure case (P-02, P-11, P-14)
      - europe             # the continent — enclosure's origin
      - africa             # the continent — the slave trade, colonization
      - barcelona          # the fish market, the cooperatives (P-IB)
      - france             # P-03, P-07, P-16
      - algeria            # Fanon's Algeria (P-07, P-CE)
      - chelsea-norfolk    # the Norfolk neighborhood (distinct from London Chelsea)
      - narmada            # the Narmada valley, India — Roy's dams
      - turin              # Gramsci's Turin — the factory councils
      - palmares           # Quilombo dos Palmares, Brazil — the maroon polity
      - london
      - berlin
      - italy              # Gramsci's Italy
      - aragon             # the Spanish anarchist collectives (P-03, P-10)

  # ===========================================================================
