  # ===========================================================================
  # concept — book-level concepts and named practices.
  # ===========================================================================
  concept:
    description: |
      Named concepts and practices the gesture invokes. The book's
      structural argument runs through this namespace.
    cardinality: zero-or-more
    open: true
    terms:
      - auzolan
      - andecha
      - bayanihan
      - minga
      - etxe
      - lehen-auzoa
      - commons
      - mutual-aid
      - cooperative
      - clt                  # community land trust
      - federation
      - mandar-obedeciendo
      - caracol
      - junta-de-buen-gobierno
      - prefigurative
      - primitive-accumulation
      - enclosure
      - the-outside          # Luxemburg sense
      - racial-capitalism
      - production-of-subjectivity  # Hardt & Negri — capital produces subjects
      - hegemony             # Gramsci — production of consent, not domination by force
      - conscientization     # Freire — naming the structures that made you silent (ASCII form)
      - biopower             # Foucault — power that manages life, not just threatens death
      - biopolitics          # the contested field between biopower and the subject
      - character-armor      # Reich — somatic hold the body learns under conditions (P-OA, P-WW)
      - aura                 # Benjamin — the unique phenomenon of a distance, however close it may be
      - dialectical-image    # Benjamin — the past flashing up at the instant it can be recognized
      - detournement         # Situationist — turning-back-against, reuse of dominant culture's materials
      - the-collector        # Benjamin — the practice of finding fragments that read against the official story
      - the-wizard           # the figure who reads the wreckage and finds the seed
      - the-council          # the perceptual commons — where what you saw stays seen because others see it
      - the-shard            # the specific fragment held long enough to see what it has always been saying
      - the-line             # the frontline of defense (Zuccotti, Standing Rock, headwaters)
      - the-back-line        # the distributed work of defense — wiring, household, teaching, writing
      - sacer                # Latin — set apart, removed from ordinary use, defended by taboo
      - sacred               # the generalized form of sacer/sanctus/hieros
      - degenerate-art       # Nazi designation; the painter as madman
      - progress             # the storm — the official story of forward motion that buries what it enclosed
      - solidarity           # connection's political name — the act the demons have never been able to administer
      # Power-and-governance vocabulary (theory chapters)
      - civil-society        # Gramsci — the dense web of associations through which hegemony lives and is contested
      - necropolitics        # Mbembe — power expressed as the management of who is allowed to die
      - simulation           # Baudrillard — the map preceding the territory; plans based on appearances
      - capture              # the structural form by which institutions absorb the people they recruit
      # Wizard-book / initiation vocabulary (P-OA, P-WW, etc.)
      - orgone               # Reich's hypothetical bioenergetic field (P-OA)
      - vegetotherapy        # Reich's body-oriented therapy (P-OA)
      - dearmoring           # the practice of unbinding character-armor (P-OA)
      - workers-democracy    # Reich's political form before the box (P-OA)
      - death-drive          # Freud's Thanatos — Reich's break with Freud (P-OA)
      - burnout              # the structural form of armor's collapse (P-OA)
      - discipline           # the practice that holds, not the punishment (P-OA)
      - practice             # the noun: a thing done repeatedly until it knows you (P-OA)
      - mastery              # what practice is and isn't aiming at (P-OA)
      - attention            # the substrate the enclosure tries to enclose (P-OA, P-RE)
      - resonance            # somatic register: bodies responding to bodies (P-OA)
      - being-held           # what community gives that armor was substituting for (P-OA)
      - community            # the formal counter-form to character-armor (P-OA)
      - kokoro               # Japanese — heart-mind, the unified seat (P-OA)
      - spirit               # the generalized form held in P-OA's register
      - citta-vritti         # Sanskrit — the fluctuations of consciousness (P-OA)
      - descent              # the underworld passage that becomes curriculum (P-OA, P-AB)
      - the-shrug            # the gesture as system — Chapter 6's title (P-06)
      - wages-of-whiteness   # Du Bois — the psychic compensation that purchased silence (P-OA)
      - debt                 # Graeber — credit as social relation, enclosed into a product
      - fascism              # the structural form, treated across P-09 and P-OA

  # ===========================================================================
  # year — the time the gesture takes place in or anchors to. Used by
  # the wizard's terrain-reading queries (what does the temporal slice
  # of 1941, 1981, 2020 look like across the book?).
  # ===========================================================================
  year:
    description: |
      The primary year the gesture anchors to. Multiple permitted when
      a gesture spans years (a long-construction gesture). Format YYYY.
    cardinality: zero-or-more
    open: true
    terms:
      - "1941"
      - "1956"
      - "1976"
      - "1981"
      - "1983"
      - "1984"
      - "1991"
      - "1994"
      - "1996"
      - "2003"
      - "2013"
      - "2014"
      - "2015"
      - "2017"
      - "2020"
      - "2023"
      - "2024"
      - "2025"
      - "2026"
      - "1920"
      - "1921"
      - "1933"
      - "1936"
      - "1940"
      - "2011"
      - "2016"
      - "2022"

  # ===========================================================================
  # zone — the gesture's home zone on the territory map. Mirrors the
  # plateau's `map.zone` for tag-only spatial queries.
  # ===========================================================================
  zone:
    description: |
      The territory-map zone the gesture lives in. Inherited from
      the home plateau by default; override per gesture only when a
      gesture genuinely belongs to a different zone (rare).
    cardinality: zero-or-one
    terms:
      - outer-edge
      - clearings
      - high-ridges
      - old-growth
      - second-growth      # regrown forest; the wizard-book practice ground (P-OA)
      - the-river
      - the-wizards-cottage
      - standing-stones

  # ===========================================================================
  # direction — wheel-of-eight direction the gesture sits in. Inherited
  # from plateau by default; override when a gesture genuinely moves the
  # wheel.
  # ===========================================================================
  direction:
    description: |
      The wheel-of-eight direction the gesture sits in. Plateaus carry
      a seat and an axis; gestures can refine — a gesture inside an
      S-seated plateau might genuinely sit at NE (opening) or NW (grief
      processing). Use sparingly; over-tagging here is noise.
    cardinality: zero-or-one
    terms:
      - n
      - ne
      - e
      - se
      - s
      - sw
      - w
      - nw

  # ===========================================================================
  # technology — material technologies the gesture references as part of
  # its system-naming. Distinct from `concept` (an idea) and `place` (a
  # location): a technology is a built artifact whose form has political
  # consequences (the car, the road, the platform, the algorithm).
  # ===========================================================================
  technology:
    description: |
      Material technologies the gesture invokes as agents in the system
      it describes. Use when the technology is doing political work in
      the prose, not just appearing as scenery.
    cardinality: zero-or-more
    open: true
    terms:
      - car                # the automobile as urban-form determinant (P-01)

  # ===========================================================================
  # emotion — the emotional weather of the gesture. Distinct from voice
  # (who is speaking) and concept (what is being argued); emotion is the
  # affective register the prose carries. The book has an emotional spine
  # as much as an argumentative one; this is the axis to query it on.
  # ===========================================================================
  emotion:
    description: |
      The emotional register the gesture carries or evokes. Use sparingly;
      most gestures are emotionally complex. Tag only when one register
      is doing load-bearing work.
    cardinality: zero-or-more
    open: true
    terms:
      - rage               # the rage-at-functioning-system register (P-01)
      - fatigue            # exhaustion, capacity-depletion (P-01, P-OA)
      - disgust            # the moral-disgust pivot that precedes exodus (P-01)

  # ===========================================================================
  # action — what happens IN the gesture as an act, distinct from the
  # gesture's rhetorical `kind`. `kind/naming` is a gesture that names;
  # `action/naming` is a gesture in which an act of naming occurs (a
  # character names something). Both can be true; they answer different
  # questions about the same gesture.
  # ===========================================================================
  action:
    description: |
      The act performed within the gesture (someone travels, names,
      exits, votes). Distinct from `kind` (the gesture's rhetorical form).
      A gesture can carry both; they answer different questions.
    cardinality: zero-or-more
    open: true
    terms:
      - travel             # going-to-other-places, often as comparison-source (P-01)
      - naming             # an act of naming-out-loud occurs in the gesture (P-01)
      - narrative          # a narrative is told within the gesture
      - parliamentary      # a procedural / vote / motion act (P-01)
      - exodus             # an act of leaving — quit, resign, walk out (P-01)
