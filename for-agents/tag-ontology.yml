      Named persons the gesture is about. Distinct from `voice` which
      tags whose voice is sounding; a person can appear without speaking.
    cardinality: zero-or-more
    open: true
    terms:
      - arizmendiarrieta
      - sanders-bernie
      - lumumba-chokwe       # the father
      - lumumba-chokwe-antar # the son
      - lumumba-rukia        # the daughter
      - franco               # the dictator (passing reference)
      - reagan               # passing reference
      - pope-francis         # 2015 declaration
      - subcomandante-moises
      - ostrom-elinor
      - hardt                # Michael Hardt — Empire, Commonwealth
      - negri                # Antonio Negri — Empire, Commonwealth
      - gramsci              # Antonio Gramsci — Prison Notebooks, hegemony
      - freire               # Paulo Freire — Pedagogy of the Oppressed
      - luxemburg            # Rosa Luxemburg — The Accumulation of Capital
      - federici             # Silvia Federici — Caliban and the Witch
      - fanon                # Frantz Fanon — The Wretched of the Earth
      - du-bois              # W.E.B. Du Bois — wages of whiteness (P-OA)
      - foucault             # Michel Foucault — biopower, discipline, governmentality
      - deleuze              # Gilles Deleuze — A Thousand Plateaus, Geology of Morals
      - guattari             # Félix Guattari — A Thousand Plateaus, the refrain
      - benjamin             # Walter Benjamin — Theses on the Philosophy of History, the Arcades Project, aura
      - klee                 # Paul Klee — painter of Angelus Novus
      - debord               # Guy Debord — Society of the Spectacle, détournement
      - alexander            # Christopher Alexander — A Pattern Language, the magic of the city
      - prechtel             # Martín Prechtel — the descent requires a community that knows how to receive
      - arendt               # Hannah Arendt — carried Benjamin's Theses out of France
      - plotkin              # Bill Plotkin — Soulcraft, the soul's gift
