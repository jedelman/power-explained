[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# the-common React app lives at its own Netlify site
[[redirects]]
  from   = "/the-common"
  to     = "https://the-common.netlify.app"
  status = 301

# Submodule path — redirect for-agents bare path to index
[[redirects]]
  from   = "/for-agents"
  to     = "/for-agents/index.html"
  status = 200
