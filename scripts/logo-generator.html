<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Explained — Emergent Inscription</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --ink: #1a1714;
            --paper: #f2ece0;
            --red: #a0291c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }

        .sidebar {
            width: 300px; flex-shrink: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow-y: auto;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 20px; font-weight: 500; margin-bottom: 4px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 12px; margin-bottom: 28px; line-height: 1.5; }

        .control-section { margin-bottom: 28px; }
        .control-section h3 {
            font-size: 13px; font-weight: 600; margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }

        .seed-input {
            width: 100%; background: var(--anthropic-light);
            padding: 10px; border-radius: 8px;
            font-family: 'Courier New', monospace; font-size: 13px;
            margin-bottom: 10px; border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); }

        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }

        .control-group { margin-bottom: 18px; }
        .control-group label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 6px; }
        .slider-container { display: flex; align-items: center; gap: 10px; }
        .slider-container input[type="range"] {
            flex: 1; height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px; outline: none; -webkit-appearance: none;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            background: var(--anthropic-orange); border-radius: 50%; cursor: pointer;
        }
        .value-display {
            font-family: 'Courier New', monospace; font-size: 11px;
            color: var(--anthropic-mid-gray); min-width: 48px; text-align: right;
        }

        .color-group { margin-bottom: 12px; }
        .color-group label { display: block; font-size: 11px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] {
            width: 28px; height: 28px; border: none; border-radius: 4px; cursor: pointer; background: none; padding: 0;
        }
        .color-value { font-family: 'Courier New', monospace; font-size: 11px; color: var(--anthropic-mid-gray); }

        button {
            width: 100%; padding: 9px 12px; border: 1px solid var(--anthropic-light-gray);
            border-radius: 6px; background: white; cursor: pointer;
            font-family: 'Poppins', sans-serif; font-size: 12px;
            color: var(--anthropic-dark); transition: all 0.15s;
        }
        button:hover { background: var(--anthropic-light); border-color: var(--anthropic-orange); }
        .button-primary { background: var(--anthropic-orange); color: white; border-color: var(--anthropic-orange); }
        .button-primary:hover { background: #c86641; }
        .button-row { display: flex; gap: 8px; }
        .button-row button { flex: 1; }

        .mode-toggle {
            display: flex; gap: 6px; margin-bottom: 14px;
        }
        .mode-btn {
            flex: 1; padding: 7px; font-size: 11px; border-radius: 6px;
            border: 1px solid var(--anthropic-light-gray);
            background: white; cursor: pointer; font-family: 'Poppins', sans-serif;
            transition: all 0.15s;
        }
        .mode-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; }
        #canvas-container canvas { border-radius: 4px; box-shadow: 0 8px 32px rgba(20,20,19,0.15); }

        .status {
            font-family: 'Courier New', monospace; font-size: 10px;
            color: var(--anthropic-mid-gray); margin-top: 8px; text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h1>Emergent Inscription</h1>
        <p class="subtitle">A Power Explained logo generator. Form arises from collective behavior — never commanded, always coherent.</p>

        <!-- Seed -->
        <div class="control-section">
            <h3>Seed</h3>
            <input class="seed-input" type="number" id="seed-input" value="42" onchange="updateSeed()">
            <div class="seed-controls">
                <button onclick="previousSeed()">← Prev</button>
                <button onclick="nextSeed()">Next →</button>
                <button onclick="randomSeedAndUpdate()">Random</button>
                <button class="button-primary" onclick="regenerate()">Regenerate</button>
            </div>
            <div class="status" id="status-text">Ready</div>
        </div>

        <!-- Mode -->
        <div class="control-section">
            <h3>Mark</h3>
            <div class="mode-toggle">
                <button class="mode-btn active" id="mode-PE" onclick="setMode('PE')">PE</button>
                <button class="mode-btn" id="mode-P" onclick="setMode('P')">P</button>
                <button class="mode-btn" id="mode-circle" onclick="setMode('circle')">○</button>
                <button class="mode-btn" id="mode-dot" onclick="setMode('dot')">·</button>
            </div>
        </div>

        <!-- Parameters -->
        <div class="control-section">
            <h3>Parameters</h3>
            <div class="control-group">
                <label>Particle Count</label>
                <div class="slider-container">
                    <input type="range" id="particleCount" min="1000" max="12000" step="500" value="6000" oninput="updateParam('particleCount', +this.value)">
                    <span class="value-display" id="particleCount-value">6000</span>
                </div>
            </div>
            <div class="control-group">
                <label>Attractor Strength</label>
                <div class="slider-container">
                    <input type="range" id="attractStrength" min="0.1" max="3.0" step="0.1" value="1.2" oninput="updateParam('attractStrength', +this.value)">
                    <span class="value-display" id="attractStrength-value">1.2</span>
                </div>
            </div>
            <div class="control-group">
                <label>Turbulence</label>
                <div class="slider-container">
                    <input type="range" id="turbulence" min="0" max="2.0" step="0.05" value="0.55" oninput="updateParam('turbulence', +this.value)">
                    <span class="value-display" id="turbulence-value">0.55</span>
                </div>
            </div>
            <div class="control-group">
                <label>Noise Scale</label>
                <div class="slider-container">
                    <input type="range" id="noiseScale" min="0.002" max="0.04" step="0.001" value="0.012" oninput="updateParam('noiseScale', +this.value)">
                    <span class="value-display" id="noiseScale-value">0.012</span>
                </div>
            </div>
            <div class="control-group">
                <label>Particle Size</label>
                <div class="slider-container">
                    <input type="range" id="particleSize" min="0.5" max="4.0" step="0.1" value="1.4" oninput="updateParam('particleSize', +this.value)">
                    <span class="value-display" id="particleSize-value">1.4</span>
                </div>
            </div>
            <div class="control-group">
                <label>Steps (convergence)</label>
                <div class="slider-container">
                    <input type="range" id="steps" min="80" max="600" step="20" value="280" oninput="updateParam('steps', +this.value)">
                    <span class="value-display" id="steps-value">280</span>
                </div>
            </div>
            <div class="control-group">
                <label>Damping</label>
                <div class="slider-container">
                    <input type="range" id="damping" min="0.7" max="0.99" step="0.01" value="0.88" oninput="updateParam('damping', +this.value)">
                    <span class="value-display" id="damping-value">0.88</span>
                </div>
            </div>
        </div>

        <!-- Colors -->
        <div class="control-section">
            <h3>Colors</h3>
            <div class="color-group">
                <label>Background</label>
                <div class="color-picker-container">
                    <input type="color" id="bgColor" value="#f2ece0" onchange="updateColor('bgColor', this.value)">
                    <span class="color-value" id="bgColor-value">#f2ece0</span>
                </div>
            </div>
            <div class="color-group">
                <label>Ink (early particles)</label>
                <div class="color-picker-container">
                    <input type="color" id="inkColor" value="#1a1714" onchange="updateColor('inkColor', this.value)">
                    <span class="color-value" id="inkColor-value">#1a1714</span>
                </div>
            </div>
            <div class="color-group">
                <label>Red (accent / outliers)</label>
                <div class="color-picker-container">
                    <input type="color" id="redColor" value="#a0291c" onchange="updateColor('redColor', this.value)">
                    <span class="color-value" id="redColor-value">#a0291c</span>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="control-section">
            <h3>Actions</h3>
            <div class="button-row" style="margin-bottom:8px;">
                <button onclick="resetParameters()">Reset</button>
                <button onclick="downloadPNG()">Download PNG</button>
            </div>
        </div>
    </div>

    <div class="canvas-area">
        <div id="canvas-container"></div>
    </div>
</div>

<script>
// ─── Parameters ────────────────────────────────────────────────────────────
let params = {
    seed: 42,
    particleCount: 6000,
    attractStrength: 1.2,
    turbulence: 0.55,
    noiseScale: 0.012,
    particleSize: 1.4,
    steps: 280,
    damping: 0.88,
    mode: 'PE',
    bgColor: '#f2ece0',
    inkColor: '#1a1714',
    redColor: '#a0291c',
};
let defaultParams = { ...params };

// ─── State ─────────────────────────────────────────────────────────────────
let particles = [];
let attractorField = null; // 2D grid of {fx, fy, inside} per cell
let fieldW, fieldH, cellSize;
let frameCounter = 0;
let done = false;
let pg; // off-screen graphics for accumulation

// ─── p5 sketch ─────────────────────────────────────────────────────────────
const SIZE = 800;

new p5(function(p) {

    p.setup = function() {
        let canvas = p.createCanvas(SIZE, SIZE);
        canvas.parent('canvas-container');
        p.pixelDensity(1);
        pg = p.createGraphics(SIZE, SIZE);
        pg.pixelDensity(1);
        initSystem(p);
    };

    p.draw = function() {
        if (done) return;

        // Run N simulation steps per frame for speed
        const stepsPerFrame = 6;
        for (let s = 0; s < stepsPerFrame && frameCounter < params.steps; s++) {
            simulateStep(p);
            frameCounter++;
        }

        // Composite: background + accumulated particle layer
        p.image(pg, 0, 0);

        if (frameCounter >= params.steps) {
            done = true;
            document.getElementById('status-text').textContent =
                `Done — ${params.particleCount} particles, seed ${params.seed}`;
        } else {
            document.getElementById('status-text').textContent =
                `Converging… ${Math.round(frameCounter / params.steps * 100)}%`;
        }
    };

    // expose p for download
    window._p5 = p;
    window._pg = () => pg;
});

// ─── System init ───────────────────────────────────────────────────────────
function initSystem(p) {
    if (!p) p = window._p5;
    done = false;
    frameCounter = 0;
    document.getElementById('status-text').textContent = 'Building attractor field…';

    p.randomSeed(params.seed);
    p.noiseSeed(params.seed);

    // Clear off-screen graphics with background color
    pg.background(hexToRgb(params.bgColor).r, hexToRgb(params.bgColor).g, hexToRgb(params.bgColor).b);

    // Build the attractor field (SDF-based potential landscape)
    buildAttractorField(p);

    // Spawn particles randomly across the canvas
    particles = [];
    for (let i = 0; i < params.particleCount; i++) {
        particles.push(spawnParticle(p, i));
    }
}

function spawnParticle(p, index) {
    return {
        x: p.random(SIZE),
        y: p.random(SIZE),
        vx: p.random(-1, 1),
        vy: p.random(-1, 1),
        age: 0,
        // birth order → color weight
        birthOrder: index / params.particleCount,
    };
}

// ─── Attractor field construction ──────────────────────────────────────────
// We rasterize the target letterform into a grid, compute a distance field,
// and derive a force (gradient) that pulls particles toward the nearest boundary.

cellSize = 4;

function buildAttractorField(p) {
    fieldW = Math.ceil(SIZE / cellSize);
    fieldH = Math.ceil(SIZE / cellSize);
    attractorField = new Array(fieldW * fieldH);

    // Rasterize the mark to a boolean grid using p5 text rendering off-screen
    const tmp = p.createGraphics(SIZE, SIZE);
    tmp.pixelDensity(1);
    tmp.background(255);
    tmp.fill(0);
    tmp.noStroke();

    renderMark(tmp, params.mode);

    tmp.loadPixels();

    // Build boolean inside-mark grid at cell resolution
    const inside = new Uint8Array(fieldW * fieldH);
    for (let cy = 0; cy < fieldH; cy++) {
        for (let cx = 0; cx < fieldW; cx++) {
            const px = Math.min(cx * cellSize + cellSize / 2, SIZE - 1);
            const py = Math.min(cy * cellSize + cellSize / 2, SIZE - 1);
            const idx = (Math.floor(py) * SIZE + Math.floor(px)) * 4;
            // dark pixel = inside the mark
            inside[cy * fieldW + cx] = tmp.pixels[idx] < 128 ? 1 : 0;
        }
    }
    tmp.remove();

    // Compute approximate SDF (distance to nearest mark boundary) using BFS
    // Then derive normalized gradient force pointing toward boundary
    const dist = computeSDF(inside, fieldW, fieldH);

    for (let cy = 0; cy < fieldH; cy++) {
        for (let cx = 0; cx < fieldW; cx++) {
            const i = cy * fieldW + cx;
            // Gradient of distance field = direction away from boundary
            // Force = negative gradient = toward boundary
            const dx = sampleDist(dist, fieldW, fieldH, cx + 1, cy) - sampleDist(dist, fieldW, fieldH, cx - 1, cy);
            const dy = sampleDist(dist, fieldW, fieldH, cx, cy + 1) - sampleDist(dist, fieldW, fieldH, cx, cy - 1);
            const len = Math.sqrt(dx * dx + dy * dy) + 0.0001;
            attractorField[i] = {
                fx: -dx / len,
                fy: -dy / len,
                inside: inside[i],
                d: dist[i],
            };
        }
    }
}

function renderMark(g, mode) {
    const cx = SIZE / 2, cy = SIZE / 2;

    if (mode === 'PE') {
        g.textFont('Georgia');
        g.textSize(SIZE * 0.52);
        g.textAlign(g.CENTER, g.CENTER);
        g.textStyle(g.BOLD);
        g.text('PE', cx, cy);
    } else if (mode === 'P') {
        g.textFont('Georgia');
        g.textSize(SIZE * 0.6);
        g.textAlign(g.CENTER, g.CENTER);
        g.textStyle(g.BOLD);
        g.text('P', cx, cy + SIZE * 0.02);
    } else if (mode === 'circle') {
        // Annulus — ring shape
        g.ellipse(cx, cy, SIZE * 0.62, SIZE * 0.62);
        g.fill(255);
        g.ellipse(cx, cy, SIZE * 0.42, SIZE * 0.42);
        g.fill(0);
    } else if (mode === 'dot') {
        // Filled circle with inner texture ring
        g.ellipse(cx, cy, SIZE * 0.5, SIZE * 0.5);
    }
}

function computeSDF(inside, w, h) {
    // BFS from boundary to compute distance
    const INF = 9999;
    const dist = new Float32Array(w * h).fill(INF);
    const queue = [];

    // Seed: all cells adjacent to a boundary
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const i = y * w + x;
            const v = inside[i];
            // Check 4-neighbors
            const neighbors = [
                y > 0 ? inside[(y-1)*w+x] : v,
                y < h-1 ? inside[(y+1)*w+x] : v,
                x > 0 ? inside[y*w+(x-1)] : v,
                x < w-1 ? inside[y*w+(x+1)] : v,
            ];
            if (neighbors.some(n => n !== v)) {
                dist[i] = 0;
                queue.push(i);
            }
        }
    }

    // BFS
    let qi = 0;
    while (qi < queue.length) {
        const i = queue[qi++];
        const x = i % w, y = Math.floor(i / w);
        const d = dist[i];
        const ns = [[x-1,y],[x+1,y],[x,y-1],[x,y+1]];
        for (const [nx, ny] of ns) {
            if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;
            const ni = ny * w + nx;
            if (dist[ni] > d + 1) {
                dist[ni] = d + 1;
                queue.push(ni);
            }
        }
    }
    return dist;
}

function sampleDist(dist, w, h, cx, cy) {
    cx = Math.max(0, Math.min(w - 1, cx));
    cy = Math.max(0, Math.min(h - 1, cy));
    return dist[cy * w + cx];
}

// ─── Simulation step ────────────────────────────────────────────────────────
function simulateStep(p) {
    const t = frameCounter / params.steps; // 0→1 as we converge
    const ink = hexToRgb(params.inkColor);
    const red = hexToRgb(params.redColor);

    pg.noStroke();

    for (let i = 0; i < particles.length; i++) {
        const pt = particles[i];

        // Sample attractor field
        const cx = Math.floor(pt.x / cellSize);
        const cy = Math.floor(pt.y / cellSize);
        const cxi = Math.max(0, Math.min(fieldW - 1, cx));
        const cyi = Math.max(0, Math.min(fieldH - 1, cy));
        const cell = attractorField[cyi * fieldW + cxi];

        // Attractor force toward boundary
        const dist = cell.d;
        // Stronger pull when far, gentler when close (prevents vibration)
        const falloff = Math.min(1, dist / 8);
        const fx = cell.fx * params.attractStrength * falloff;
        const fy = cell.fy * params.attractStrength * falloff;

        // Perlin noise turbulence — breaks perfect convergence, makes edges breathe
        const angle = p.noise(pt.x * params.noiseScale, pt.y * params.noiseScale, frameCounter * 0.003) * Math.PI * 4;
        const nfx = Math.cos(angle) * params.turbulence;
        const nfy = Math.sin(angle) * params.turbulence;

        // Apply forces
        pt.vx = (pt.vx + fx + nfx) * params.damping;
        pt.vy = (pt.vy + fy + nfy) * params.damping;

        pt.x += pt.vx;
        pt.y += pt.vy;
        pt.age++;

        // Boundary wrap
        if (pt.x < 0) pt.x += SIZE;
        if (pt.x >= SIZE) pt.x -= SIZE;
        if (pt.y < 0) pt.y += SIZE;
        if (pt.y >= SIZE) pt.y -= SIZE;

        // Color: birth order encodes ink vs red; time encodes opacity
        // Early arrivers (low birthOrder) → dense ink
        // Outliers (high birthOrder, on edges) → hint of red
        // Opacity builds over time → accumulation painting
        const bo = pt.birthOrder;
        const redMix = Math.pow(bo, 3) * 0.6; // mostly ink, occasional red
        const r = Math.round(ink.r + (red.r - ink.r) * redMix);
        const g2 = Math.round(ink.g + (red.g - ink.g) * redMix);
        const b = Math.round(ink.b + (red.b - ink.b) * redMix);

        // Opacity: accumulation model — each particle paints very lightly,
        // density builds where many converge. Also fades turbulent outliers.
        const insideMark = cell.inside === 1;
        const baseAlpha = insideMark ? 18 : 6;
        const alpha = Math.round(baseAlpha * (0.4 + 0.6 * (1 - bo)));

        pg.fill(r, g2, b, alpha);
        const sz = params.particleSize * (0.6 + 0.4 * (1 - bo));
        pg.ellipse(pt.x, pt.y, sz, sz);
    }
}

// ─── UI handlers ────────────────────────────────────────────────────────────
function regenerate() {
    initSystem(window._p5);
    window._p5.loop();
}

function updateParam(name, value) {
    params[name] = value;
    document.getElementById(name + '-value').textContent = value;
    // Don't auto-regenerate for steps/count — wait for explicit regenerate
}

function updateColor(name, value) {
    params[name] = value;
    document.getElementById(name + '-value').textContent = value;
}

function setMode(mode) {
    params.mode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('mode-' + mode).classList.add('active');
    regenerate();
}

function updateSeed() {
    const v = parseInt(document.getElementById('seed-input').value);
    if (v > 0) { params.seed = v; regenerate(); }
}

function previousSeed() {
    params.seed = Math.max(1, params.seed - 1);
    document.getElementById('seed-input').value = params.seed;
    regenerate();
}

function nextSeed() {
    params.seed++;
    document.getElementById('seed-input').value = params.seed;
    regenerate();
}

function randomSeedAndUpdate() {
    params.seed = Math.floor(Math.random() * 99999) + 1;
    document.getElementById('seed-input').value = params.seed;
    regenerate();
}

function resetParameters() {
    params = { ...defaultParams };
    document.getElementById('seed-input').value = params.seed;
    document.getElementById('particleCount').value = params.particleCount;
    document.getElementById('particleCount-value').textContent = params.particleCount;
    document.getElementById('attractStrength').value = params.attractStrength;
    document.getElementById('attractStrength-value').textContent = params.attractStrength;
    document.getElementById('turbulence').value = params.turbulence;
    document.getElementById('turbulence-value').textContent = params.turbulence;
    document.getElementById('noiseScale').value = params.noiseScale;
    document.getElementById('noiseScale-value').textContent = params.noiseScale;
    document.getElementById('particleSize').value = params.particleSize;
    document.getElementById('particleSize-value').textContent = params.particleSize;
    document.getElementById('steps').value = params.steps;
    document.getElementById('steps-value').textContent = params.steps;
    document.getElementById('damping').value = params.damping;
    document.getElementById('damping-value').textContent = params.damping;
    document.getElementById('bgColor').value = params.bgColor;
    document.getElementById('bgColor-value').textContent = params.bgColor;
    document.getElementById('inkColor').value = params.inkColor;
    document.getElementById('inkColor-value').textContent = params.inkColor;
    document.getElementById('redColor').value = params.redColor;
    document.getElementById('redColor-value').textContent = params.redColor;
    setMode(params.mode);
    regenerate();
}

function downloadPNG() {
    const p = window._p5;
    p.saveCanvas('power-explained-logo-seed' + params.seed, 'png');
}

// ─── Utilities ──────────────────────────────────────────────────────────────
function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return { r, g, b };
}
</script>
</body>
</html>
